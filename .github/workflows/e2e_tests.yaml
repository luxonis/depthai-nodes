name: End-to-End Depthai-nodes tests

on:
  workflow_dispatch:
    inputs:
      distinct_id:
        description: 'run identifier'
        required: false
      testbed:
          description: 'On what testbed will tests be run'
          required: false
          type: string
      reservation_name:
          description: 'Reservation name - usually usually unique identifier of root CI run'
          required: false
          type: string
      additional-parameter:
        description: 'Additional parameter: -all or -p <parser_name>. Default: -all. If -p is used: -p <parser_name>'
        required: true
        default: '-all'
      branch:
        description: 'Branch to run the tests on. Default: main'
        required: true
        default: 'main'
      depthai-version:
        description: 'Version of depthai to install. Default: alpha11'
        required: true
        default: '3.0.0a11'
  push:
    branches:
      - main
    paths:
      - 'depthai_nodes/**'
      - 'tests/end_to_end/**'
      - .github/workflows/e2e_tests.yaml

jobs:
  id:
    name: Workflow ID Provider
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: echo distinct ID ${{ github.event.inputs.distinct_id }}
        run: echo ${{ github.event.inputs.distinct_id }}
  HIL-test:
    runs-on: ['self-hosted', 'testbed-runner']

    strategy:
      matrix:
        python-version: [3.12]
   

    steps:
      - name: Update HIL
        run: |
          cd /home/$USER/hil_framework
          git pull
          git submodule update --init --recursive

      - name: Add HIL Tools to Path
        run: |
          cd /home/$USER/hil_framework
          echo "$(pwd)/lib_testbed/tools" >> $GITHUB_PATH
          echo "PYTHONPATH="$PYTHONPATH:$(pwd)"" >> $GITHUB_ENV
          echo "HIL_FRAMEWORK_PATH="$(pwd)"" >> $GITHUB_ENV
          
      - name: Run Test
        run: |
          export RESERVATION_NAME="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#${{ matrix.python-version}}"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Assign testbed and reservation name only if both are provided
            if [[ -n "${{ github.event.inputs.testbed }}" && -n "${{ github.event.inputs.reservation_name }}" ]]; then
              TESTBED_OPTION="--testbed ${{ github.event.inputs.testbed }}"
              RESERVATION_OPTION="--reservation-name ${{ github.event.inputs.reservation_name }}"
            else
              TESTBED_OPTION="--capabilities 'depthai-core-hil'"
              RESERVATION_OPTION="--reservation-name $RESERVATION_NAME"
            fi

            hil --hold-reservation --wait $TESTBED_OPTION $RESERVATION_OPTION  \
              --before-docker-pull "echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin" \
              --docker-image ghcr.io/luxonis/depthai-nodes-testing \
              --docker-run-args "--env LUXONIS_EXTRA_INDEX_URL=${{ secrets.LUXONIS_EXTRA_INDEX_URL }} \
                --env DEPTHAI_VERSION=${{ github.event.inputs.depthai-version }} \
                --env HUBAI_TEAM_SLUG=${{ secrets.HUBAI_TEAM_SLUG }} \
                --env HUBAI_API_KEY=${{ secrets.HUBAI_API_KEY }} \
                --env BRANCH=${{ github.event.inputs.branch }} \
                --env FLAGS=\"${{ github.event.inputs.additional-parameter }}\""
          else
            hil --capabilities "depthai-core-hil" --wait --reservation-name $RESERVATION_NAME \
              --before-docker-pull "echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin" \
              --docker-image ghcr.io/luxonis/depthai-nodes-testing \
              --docker-run-args "--env LUXONIS_EXTRA_INDEX_URL=${{ secrets.LUXONIS_EXTRA_INDEX_URL }} \
                --env DEPTHAI_VERSION=\"3.0.0a11\" \
                --env HUBAI_TEAM_SLUG=${{ secrets.HUBAI_TEAM_SLUG }} \
                --env HUBAI_API_KEY=${{ secrets.HUBAI_API_KEY }} \
                --env BRANCH=\"main\" \
                --env FLAGS=\"-all\""
          fi
